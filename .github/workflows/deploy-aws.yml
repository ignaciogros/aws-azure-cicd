name: Deploy to AWS ECS (EC2)

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  PROJECT: silence

permissions:
  id-token: write   # necesario para OIDC
  contents: read

jobs:
  # ── 1. Detectar qué servicios han cambiado ───────────────────────────────────
  detect-changes:
    name: Detect changed services
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.changes.outputs.services }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed services
        id: changes
        run: |
          # Primer push o disparo manual → desplegar todo
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || \
             [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            SERVICES=$(ls services/ | jq -R -s -c 'split("\n") | map(select(length > 0))')
          else
            SERVICES=$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" \
              | grep '^services/' \
              | cut -d/ -f2 \
              | sort -u \
              | jq -R -s -c 'split("\n") | map(select(length > 0))')
          fi
          echo "services=$SERVICES" >> "$GITHUB_OUTPUT"
          echo "Servicios a desplegar: $SERVICES"

  # ── 2. Build, push y deploy de cada servicio afectado ────────────────────────
  build-and-deploy:
    name: Deploy ${{ matrix.service }}
    needs: detect-changes
    if: needs.detect-changes.outputs.services != '[]' && needs.detect-changes.outputs.services != ''
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services) }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/${{ env.PROJECT }}-github-actions-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        id: push
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE="$ECR_REGISTRY/${{ env.PROJECT }}-${{ matrix.service }}:$IMAGE_TAG"
          docker build -t "$IMAGE" services/${{ matrix.service }}/
          docker push "$IMAGE"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

      - name: Register new task definition revision
        id: register
        run: |
          FAMILY="${{ env.PROJECT }}-${{ matrix.service }}"
          IMAGE="${{ steps.push.outputs.image }}"

          # Obtener la definición actual y actualizar solo la imagen
          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition "$FAMILY" \
            --query "taskDefinition" \
            --output json)

          NEW_TASK_DEF=$(echo "$TASK_DEF" | jq \
            --arg IMAGE "$IMAGE" \
            '.containerDefinitions[0].image = $IMAGE |
             del(.taskDefinitionArn, .revision, .status,
                 .requiresAttributes, .compatibilities,
                 .registeredAt, .registeredBy)')

          NEW_ARN=$(aws ecs register-task-definition \
            --cli-input-json "$NEW_TASK_DEF" \
            --query "taskDefinition.taskDefinitionArn" \
            --output text)

          echo "arn=$NEW_ARN" >> "$GITHUB_OUTPUT"

      - name: Update ECS service
        run: |
          aws ecs update-service \
            --cluster "${{ env.PROJECT }}-cluster" \
            --service "${{ env.PROJECT }}-${{ matrix.service }}-svc" \
            --task-definition "${{ steps.register.outputs.arn }}" \
            --region "${{ env.AWS_REGION }}"

      - name: Wait for service to stabilize
        run: |
          aws ecs wait services-stable \
            --cluster "${{ env.PROJECT }}-cluster" \
            --services "${{ env.PROJECT }}-${{ matrix.service }}-svc" \
            --region "${{ env.AWS_REGION }}"

      - name: Verify deployment
        run: |
          EC2_IP=$(aws ec2 describe-instances \
            --filters \
              "Name=tag:Name,Values=${{ env.PROJECT }}-ecs-node" \
              "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].PublicIpAddress" \
            --output text \
            --region "${{ env.AWS_REGION }}")

          echo "Verificando http://$EC2_IP ..."
          for i in $(seq 1 20); do
            if curl --fail --silent "http://$EC2_IP" > /dev/null; then
              echo "Servicio desplegado en http://$EC2_IP"
              exit 0
            fi
            echo "Intento $i/20..."
            sleep 10
          done
          echo "ERROR: el servicio no respondió a tiempo"
          exit 1
