name: Deploy to Azure ACI

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  ACR_NAME:       silenceacr202506   # nombre globalmente único en Azure — cámbialo si ya existe
  RESOURCE_GROUP: rg-silence
  LOCATION:       westeurope
  PROJECT:        silence

permissions:
  contents: read

jobs:
  detect-changes:
    name: Detect changed services
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.changes.outputs.services }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed services
        id: changes
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || \
             [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            SERVICES=$(ls services/ | jq -R -s -c 'split("\n") | map(select(length > 0))')
          else
            SERVICES=$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" \
              | grep '^services/' | cut -d/ -f2 | sort -u \
              | jq -R -s -c 'split("\n") | map(select(length > 0))')
          fi
          echo "services=$SERVICES" >> "$GITHUB_OUTPUT"

  build-and-deploy:
    name: Deploy ${{ matrix.service }} to ACI
    needs: detect-changes
    if: needs.detect-changes.outputs.services != '[]' && needs.detect-changes.outputs.services != ''
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services) }}

    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build and push to ACR
        id: push
        run: |
          az acr login --name ${{ env.ACR_NAME }}
          IMAGE="${{ env.ACR_NAME }}.azurecr.io/${{ env.PROJECT }}-${{ matrix.service }}:${{ github.sha }}"
          docker build -t "$IMAGE" services/${{ matrix.service }}/
          docker push "$IMAGE"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

      - name: Deploy to ACI
        run: |
          CONTAINER="${{ env.PROJECT }}-${{ matrix.service }}-aci"
          # ACI no admite actualización in-place: se elimina y recrea
          az container delete --resource-group ${{ env.RESOURCE_GROUP }} --name "$CONTAINER" --yes 2>/dev/null || true
          az container create \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name "$CONTAINER" \
            --image "${{ steps.push.outputs.image }}" \
            --registry-login-server ${{ env.ACR_NAME }}.azurecr.io \
            --registry-username $(az acr credential show -n ${{ env.ACR_NAME }} --query username -o tsv) \
            --registry-password $(az acr credential show -n ${{ env.ACR_NAME }} --query "passwords[0].value" -o tsv) \
            --dns-name-label "${{ env.PROJECT }}-${{ matrix.service }}" \
            --ports 80 --location ${{ env.LOCATION }} \
            --cpu 1 --memory 1 --os-type Linux --restart-policy Always

      - name: Verify deployment
        run: |
          URL="http://${{ env.PROJECT }}-${{ matrix.service }}.${{ env.LOCATION }}.azurecontainer.io"
          echo "Verificando $URL ..."
          for i in $(seq 1 30); do
            if curl --fail --silent "$URL" > /dev/null; then
              echo "OK → $URL"; exit 0
            fi
            echo "Intento $i/30..."; sleep 10
          done
          echo "ERROR: el servicio no respondió a tiempo"; exit 1
